<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchCV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fafafa; font-family: 'Inter', sans-serif; padding: 40px 20px; }
     .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 52px; font-weight: 700; margin-bottom: 12px; background: linear-gradient(135deg, #22c55e 0%, #10b981 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
     .subtitle { color: #a3a3a3; font-size: 18px; margin-bottom: 48px; }
     .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
     .input-group { display: flex; flex-direction: column; }
        label { color: #e5e5e5; font-size: 16px; font-weight: 600; margin-bottom: 12px; }
     .file-input { background: #171717; border: 2px dashed #404040; border-radius: 12px; padding: 60px 20px; cursor: pointer; text-align: center; position: relative; }
        #cvInput { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
        #fileName { color: #fafafa; font-size: 16px; pointer-events: none; }
        textarea { background: #171717; border: 1px solid #404040; border-radius: 12px; padding: 18px; color: #fafafa; font-size: 15px; min-height: 220px; resize: vertical; }
        button { width: 100%; background: #22c55e; color: #000; border: none; padding: 18px; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; }
        button:disabled { background: #404040; }
     .result { margin-top: 40px; padding: 32px; background: #171717; border-radius: 12px; border: 1px solid #262626; display: none; }
     .result.show { display: block; }
     .match-container { text-align: center; margin: 20px 0 32px 0; }
     .score-circle { position: relative; display: inline-block; width: 140px; height: 140px; }
     .score-circle svg { width: 140px; height: 140px; }
     .bg-circle { fill: none; stroke: #262626; stroke-width: 10; }
     .progress-circle { fill: none; stroke: #22c55e; stroke-width: 10; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50% 50%; stroke-dasharray: 408.407; stroke-dashoffset: 408.407; transition: stroke-dashoffset 1.5s ease-out; }
     .score-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 42px; font-weight: 800; }
     .score-number span { font-size: 20px; color: #a3a3a3; }
     .score-label { margin-top: 16px; color: #d4d4d4; font-weight: 600; }
     .score-low { stroke: #ef4444; }
     .score-mid { stroke: #f59e0b; }
     .score-high { stroke: #22c55e; }
     .result-section { margin-bottom: 24px; }
     .result-section h3 { color: #fafafa; font-size: 20px; margin-bottom: 12px; }
     .result-section p { color: #d4d4d4; font-size: 15px; }
        @media (max-width: 768px) {.input-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <main class="container">
        <h1>⚡ MatchCV</h1>
        <p class="subtitle">Convertí el "no" en "¿cuánto querés ganar?"</p>
        <div class="input-grid">
            <div class="input-group">
                <label>1. Adjuntar CV en PDF</label>
                <div class="file-input">
                    <input type="file" id="cvInput" accept=".pdf" onchange="updateFileName(this)">
                    <span id="fileName">📄 Cargar archivo PDF</span>
                </div>
            </div>
            <div class="input-group">
                <label>2. Descripción del puesto</label>
                <textarea id="job" placeholder="Ingrese la descripción completa del puesto..."></textarea>
            </div>
        </div>
        <button id="btnAnalizar" onclick="analizar()">Procesar análisis</button>
        <div class="result" id="resultado"></div>
    </main>
    <script>
        function updateFileName(input) {
            const fileName = document.getElementById('fileName');
            if (input.files.length > 0) {
                fileName.textContent = '✅ ' + input.files[0].name;
                fileName.style.color = '#22c55e';
            }
        }
        function animarScore(porcentaje) {
            const circle = document.querySelector('.progress-circle');
            const number = document.querySelector('.score-number');
            if (!circle ||!number) return;
            circle.classList.remove('score-low', 'score-mid', 'score-high');
            if (porcentaje < 50) circle.classList.add('score-low');
            else if (porcentaje < 80) circle.classList.add('score-mid');
            else circle.classList.add('score-high');
            const offset = 408.407 - (408.407 * porcentaje / 100);
            setTimeout(() => { circle.style.strokeDashoffset = offset; }, 100);
            let current = 0;
            const timer = setInterval(() => {
                current++;
                number.innerHTML = current + '<span>%</span>';
                if (current >= porcentaje) clearInterval(timer);
            }, 15);
        }
        async function analizar() {
            const cvFile = document.getElementById('cvInput').files[0];
            const jobDesc = document.getElementById('job').value;
            const btn = document.getElementById('btnAnalizar');
            const resultado = document.getElementById('resultado');
            if (!cvFile ||!jobDesc.trim()) {
                alert('Faltan datos');
                return;
            }
            btn.disabled = true;
            btn.textContent = 'Analizando...';
            resultado.classList.remove('show');
            const formData = new FormData();
            formData.append('file', cvFile);
            formData.append('job_description', jobDesc);
            try {
                const response = await fetch('https://matchcv-production-8eeb.up.railway.app/analizar-cv', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                const score = Number(data?.score) || 0;
                resultado.innerHTML = `
                    <div class="match-container">
                        <div class="score-circle">
                            <svg width="140" height="140">
                                <circle class="bg-circle" cx="70" cy="70" r="65" />
                                <circle class="progress-circle" cx="70" cy="70" r="65" />
                            </svg>
                            <div class="score-number">0<span>%</span></div>
                        </div>
                        <p class="score-label">Match con el puesto</p>
                    </div>
                    <div class="result-section"><h3>Fortalezas detectadas</h3><p>${data?.fortalezas || 'No detectadas'}</p></div>
                    <div class="result-section"><h3>Brechas a mejorar</h3><p>${data?.gaps || 'No detectadas'}</p></div>
                `;
                resultado.classList.add('show');
                setTimeout(() => animarScore(score), 200);
            } catch (error) {
                alert('Error de servidor');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Procesar análisis';
            }
        }
    </script>
</body>
</html>
